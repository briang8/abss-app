name: abss_app
description: Alerts by Stay Safe, a Climate alert and forecast app for East Africa
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  #State management
  
  flutter_riverpod: ^3.3.1

  #Firebase
  firebase_core:      ^3.15.2
  cloud_firestore:    ^5.6.12
  firebase_messaging: ^15.2.7

  # Location
  geolocator: ^13.0.4     # GPS position + permission
  geocoding:  ^3.0.0      # Reverse-geocode lat/lng to city name

  #  Networking 
  http:              ^1.2.2   # Open-Meteo REST calls (free weather API)
  connectivity_plus: ^6.0.3   # Online/offline detection stream

  #  Local storage 
  shared_preferences: ^2.5.4  # Persist theme, profile, onboarding flag

  #  UI 
  google_fonts:    ^6.3.2     # DM Sans typeface (loaded at runtime, no assets needed)
  cupertino_icons: ^1.0.8

  #  Utilities 
  intl: ^0.20.2               # DateFormat for forecast time labels

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
